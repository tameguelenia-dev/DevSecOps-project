# ═══════════════════════════════════════════════════════════
#  HYBRID DEVSECOPS PIPELINE
#  Zero Trust Security Layer — Never trust, always verify
#  Tools: Bandit, SonarQube, Snyk, OWASP ZAP, AI Analysis
# ═══════════════════════════════════════════════════════════
stages:
  - test
  - sast
  - secrets
  - sca
  - build
  - dynamic-testing
  - security-gate
  - report

variables:
  REPORTS_DIR: "security-reports"

unit-tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir flask pytest pytest-cov
  script:
    - echo "Zero Trust - Verifying code functionality..."
    - pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --junitxml=test-results.xml
    - echo "Unit tests passed"
  artifacts:
    when: always
    reports:
      junit: test-results.xml
    paths:
      - coverage.xml
      - test-results.xml
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

sast-bandit:
  stage: sast
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir bandit
    - mkdir -p $REPORTS_DIR
  script:
    - echo "Zero Trust - Static code analysis with Bandit..."
    - bandit -r . --exclude ./.git,./tests -f json -o $REPORTS_DIR/bandit-report.json || true
    - bandit -r . --exclude ./.git,./tests -f txt || true
    - echo "Bandit SAST completed"
  artifacts:
    when: always
    paths:
      - $REPORTS_DIR/bandit-report.json
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

sast-sonarqube:
  stage: sast
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  before_script:
    - mkdir -p $REPORTS_DIR
  script:
    - echo "Zero Trust - SonarQube analysis..."
    - >
      if [ -z "$SONAR_TOKEN" ]; then
        echo "SONAR_TOKEN not set - SonarQube skipped";
        echo "{\"status\":\"skipped\",\"reason\":\"SONAR_TOKEN not configured\"}" > $REPORTS_DIR/sonarqube-report.json;
        exit 0;
      fi
    - sonar-scanner
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.sources=.
      -Dsonar.host.url=${SONAR_HOST_URL:-https://sonarcloud.io}
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.python.version=3
      || true
    - echo "SonarQube completed"
  artifacts:
    when: always
    paths:
      - $REPORTS_DIR/
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

secrets-scan:
  stage: secrets
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir detect-secrets
    - mkdir -p $REPORTS_DIR
  script:
    - echo "Zero Trust - Scanning for exposed secrets..."
    - detect-secrets scan > $REPORTS_DIR/secrets-report.json || true
    - echo "Secrets scan completed"
  artifacts:
    when: always
    paths:
      - $REPORTS_DIR/
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

sca-snyk:
  stage: sca
  image: node:18-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq python3 python3-pip
    - npm install -g snyk
    - mkdir -p $REPORTS_DIR
  script:
    - echo "Zero Trust - Dependency scan with Snyk..."
    - snyk auth $SNYK_TOKEN
    - snyk test --file=app/requirements.txt --package-manager=pip --json > $REPORTS_DIR/snyk-report.json || true
    - snyk test --file=app/requirements.txt --package-manager=pip || true
    - echo "Snyk SCA completed"
  artifacts:
    when: always
    paths:
      - $REPORTS_DIR/snyk-report.json
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

docker-build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - echo "Zero Trust - Building verified Docker image..."
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - echo "Docker image built and pushed"
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

dast-owasp-zap:
  stage: dynamic-testing
  image: python:3.12-slim
  before_script:
    - mkdir -p $REPORTS_DIR
  script:
    - echo "Zero Trust - DAST with OWASP ZAP against $DEPLOY_URL..."
    - python3 scripts/dast_scan.py
    - echo "DAST completed"
  artifacts:
    when: always
    paths:
      - $REPORTS_DIR/
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ─────────────────────────────────────────────────────────
# SECURITY GATE — Zero Trust Enforcement
# Never trust, always verify
# Blocks deployment if critical vulnerabilities found
# ─────────────────────────────────────────────────────────
security-gate:
  stage: security-gate
  image: python:3.12-slim
  before_script:
    - mkdir -p $REPORTS_DIR
  script:
    - echo "▶ ZERO TRUST — Security Gate verification..."
    - |
      python3 << 'PYEOF'
      import json
      import os
      import sys

      reports_dir = os.environ.get('REPORTS_DIR', 'security-reports')

      print("=" * 60)
      print("  ZERO TRUST SECURITY GATE")
      print("  Principle: Never trust, always verify")
      print("  Checking all security scan results...")
      print("=" * 60)

      critical_issues = []
      high_issues = []

      # Check Bandit
      bandit_path = f'{reports_dir}/bandit-report.json'
      if os.path.exists(bandit_path):
          with open(bandit_path) as f:
              bandit = json.load(f)
          for r in bandit.get('results', []):
              if r.get('issue_severity') == 'CRITICAL':
                  critical_issues.append(f"Bandit: {r.get('issue_text','')}")
              elif r.get('issue_severity') == 'HIGH':
                  high_issues.append(f"Bandit: {r.get('issue_text','')}")
          print(f"  ✅ Bandit verified: {len(bandit.get('results',[]))} findings")

      # Check Snyk
      snyk_path = f'{reports_dir}/snyk-report.json'
      if os.path.exists(snyk_path):
          with open(snyk_path) as f:
              snyk = json.load(f)
          for v in snyk.get('vulnerabilities', []):
              if v.get('severity') == 'critical':
                  critical_issues.append(f"Snyk: {v.get('title','')}")
              elif v.get('severity') == 'high':
                  high_issues.append(f"Snyk: {v.get('title','')}")
          print(f"  ✅ Snyk verified: {len(snyk.get('vulnerabilities',[]))} vulnerabilities")

      # Check ZAP
      zap_path = f'{reports_dir}/zap-report.json'
      if os.path.exists(zap_path):
          with open(zap_path) as f:
              zap = json.load(f)
          for alert in zap.get('alerts', []):
              if alert.get('risk') == 'CRITICAL':
                  critical_issues.append(f"ZAP: {alert.get('alert','')}")
              elif alert.get('risk') == 'HIGH':
                  high_issues.append(f"ZAP: {alert.get('alert','')}")
          print(f"  ✅ ZAP verified: {len(zap.get('alerts',[]))} alerts")

      print("=" * 60)

      if critical_issues:
          print("  ❌ ZERO TRUST — ACCESS DENIED")
          print("  SECURITY GATE BLOCKED — Critical vulnerabilities found:")
          for issue in critical_issues:
              print(f"  → {issue}")
          print("  Deployment to production is BLOCKED")
          print("  Fix all critical issues before deploying")
          print("=" * 60)
          sys.exit(1)
      elif high_issues:
          print("  ⚠️  ZERO TRUST — WARNING")
          print(f"  {len(high_issues)} HIGH severity issues found:")
          for issue in high_issues:
              print(f"  → {issue}")
          print("  Deployment ALLOWED but review recommended")
          print("=" * 60)
      else:
          print("  ✅ ZERO TRUST — ACCESS GRANTED")
          print("  SECURITY GATE PASSED")
          print("  No critical or high vulnerabilities detected")
          print("  Code verified — deployment to production ALLOWED")
          print("=" * 60)
      PYEOF
    - echo "✅ Security Gate completed"
  needs:
    - sast-bandit
    - secrets-scan
    - sca-snyk
    - dast-owasp-zap
  artifacts:
    when: always
    paths:
      - $REPORTS_DIR/
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

security-report:
  stage: report
  image: python:3.12-slim
  before_script:
    - mkdir -p $REPORTS_DIR
  script:
    - echo "AI Analysis - Generating security report..."
    - python3 scripts/ai_report.py
    - echo "Report generated"
  artifacts:
    when: always
    paths:
      - $REPORTS_DIR/
    expire_in: 90 days
  needs:
    - unit-tests
    - sast-bandit
    - sast-sonarqube
    - secrets-scan
    - sca-snyk
    - dast-owasp-zap
    - security-gate
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
 